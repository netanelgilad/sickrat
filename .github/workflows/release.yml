name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build CLI binaries and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck CLI
        run: npm --workspace apps/cli run typecheck

      - name: Build release binaries
        run: |
          mkdir -p dist/release
          bun build --compile --target=bun-darwin-arm64 apps/cli/src/index.ts --outfile dist/release/sickrat-darwin-arm64
          bun build --compile --target=bun-darwin-x64 apps/cli/src/index.ts --outfile dist/release/sickrat-darwin-x64
          bun build --compile --target=bun-linux-arm64 apps/cli/src/index.ts --outfile dist/release/sickrat-linux-arm64
          bun build --compile --target=bun-linux-x64-baseline apps/cli/src/index.ts --outfile dist/release/sickrat-linux-x64
          shasum -a 256 dist/release/sickrat-* > dist/release/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sickrat-cli-binaries
          path: dist/release/*
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/release/*
