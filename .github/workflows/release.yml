name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build CLI binaries and publish release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: release_tag
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a semantic version tag beginning with v, received: $RELEASE_TAG" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck CLI
        run: npm --workspace apps/cli run typecheck

      - name: Build web deploy artifact
        run: npm run web:build

      - name: Build release binaries
        run: |
          mkdir -p dist/release
          bun build --compile --target=bun-darwin-arm64 apps/cli/src/index.ts --outfile dist/release/sickrat-darwin-arm64
          bun build --compile --target=bun-darwin-x64 apps/cli/src/index.ts --outfile dist/release/sickrat-darwin-x64
          bun build --compile --target=bun-linux-arm64 apps/cli/src/index.ts --outfile dist/release/sickrat-linux-arm64
          bun build --compile --target=bun-linux-x64-baseline apps/cli/src/index.ts --outfile dist/release/sickrat-linux-x64
          tar -C apps/web/dist -czf dist/release/sickrat-web-dist.tar.gz client sickrat
          (cd dist/release && shasum -a 256 sickrat-* > SHA256SUMS)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sickrat-cli-binaries
          path: dist/release/*
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: dist/release/*

  deploy-site:
    name: Deploy public release site
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: sickrat-site-production
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Check out released source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate release metadata
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        run: |
          node <<'NODE'
          const { writeFileSync } = require("node:fs");

          const tag = process.env.RELEASE_TAG;
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(`Invalid release tag: ${tag}`);
          }

          const metadata = {
            version: tag.slice(1),
            notesUrl: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/tag/${tag}`,
          };
          writeFileSync(
            "apps/site/public/releases/latest.json",
            `${JSON.stringify(metadata, null, "\t")}\n`,
          );
          NODE

      - name: Verify Cloudflare deployment credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "::error::Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN as GitHub Actions secrets before deploying the public site."
            exit 1
          fi

      - name: Build and deploy public site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run site:deploy
